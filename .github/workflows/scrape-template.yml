name: scrape template

on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: checkout gh-pages
        run: git clone https://github.com/carapace-sh/scrape --branch gh-pages --depth 1 gh-pages

      - name: scrape
        id: scrape
        run: |
            ./init.sh
            ./.github/workflows/scrape.sh "${{ inputs.command }}"

      - name: upload artifact
        if: steps.scrape.outputs.file != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.command }}
          path: ${{ steps.scrape.outputs.file }}

      - name: "push gh-pages"
        if: github.ref == 'refs/heads/master'
        run: |
            cd gh-pages
            if [ ! -z "$(git status --porcelain)" ]; then 
              git config user.name rsteube
              git config user.email rsteube@users.noreply.github.com
              git add .
              git commit -m "updated ${{ inputs.command }}"
              git pull --rebase
              git push https://rsteube:${GITHUB_TOKEN}@github.com/carapace-sh/scrape.git gh-pages:gh-pages
            fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

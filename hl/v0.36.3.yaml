# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: hl
description: JSON and logfmt log converter to human readable representation
flags:
  -P: Handful alias for --paging=never, overrides --paging option
  --allow-prefix: Allow non-JSON prefixes before JSON log entries
  --ascii=: Whether to restrict punctuation to ASCII characters only
  --buffer-size=: Buffer size
  -c: Handful alias for --color=always, overrides --color option
  --color=: Whether to use ANSI colors and styles
  -C, --concurrency=: Number of processing threads
  --config=*: Configuration file path
  --delimiter=: Log entry delimiter
  --dump-index: Print debug index metadata (in --sort mode) and exit
  -x, --expansion=: Whether to expand fields and messages
  -f, --filter=*: Filter entries by matching field values [k=v, k~=v, k~~=v, 'k!=v', 'k?!=v', etc]
  --flatten=: Whether to flatten objects
  -F, --follow: Follow input streams and sort entries chronologically within time frame set by --sync-interval-ms option
  --help?: Print help
  -h, --hide=*: Hide or reveal fields with the specified keys, prefix with ! to reveal, provide '!*' to reveal all
  -e, --hide-empty-fields: Hide empty fields, applies for null, string, object and array fields only
  --input-format=: Input format
  --input-info=: Input number and filename layouts
  --interrupt-ignore-count=: Number of interrupts to ignore, i.e. Ctrl-C (SIGINT)
  -l, --level=: Display entries with level >= <LEVEL>
  --list-themes?: Print available themes optionally filtered by tags
  -L, --local: Use local time zone, overrides --time-zone option
  --man-page: Print man page and exit
  --max-message-size=: Maximum log entry size
  --no-local: Disable local time zone, overrides --local option
  --no-raw: Disable raw source entries output, overrides --raw option
  -o, --output=: Output file
  --output-delimiter=: Output entry delimiter
  --paging=: Control pager usage (HL_PAGER or PAGER)
  -q, --query=*: Filter entries using a query expression ['status>=400 or duration>=15', etc]
  -r, --raw: Output raw source entries instead of formatted entries
  --raw-fields: Output field values as is, without unescaping or prettifying
  --shell-completions=: Print shell auto-completion script and exit
  -E, --show-empty-fields: Show empty fields, overrides --hide-empty-fields option
  --since=: Display entries with timestamp >= <TIME>
  -s, --sort: Sort entries chronologically
  --sync-interval-ms=: Synchronization interval for live streaming mode enabled by --follow option
  --tail=: Number of last entries to preload from each file in --follow mode
  --theme=: Color theme
  -t, --time-format=: Time format, see https://man7.org/linux/man-pages/man1/date.1.html
  -Z, --time-zone=: Time zone name, see column "TZ identifier" at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  --unix-timestamp-unit=: Unix timestamp unit
  --until=: Display entries with timestamp <= <TIME>
  -V, --version: Print version
completion:
  flag:
    ascii:
    - auto
    - never
    - always
    color:
    - auto
    - always
    - never
    delimiter:
    - auto
    - cr
    - lf
    - crlf
    - newline
    - nul
    expansion:
    - never
    - inline
    - auto
    - always
    flatten:
    - never
    - always
    help:
    - short
    - long
    input-format:
    - auto
    - json
    - logfmt
    input-info:
    - auto
    - none
    - minimal
    - compact
    - full
    list-themes:
    - dark
    - light
    - 16color
    - 256color
    - truecolor
    - overlay
    - base

# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: wt
description: Git worktree management for parallel AI agent workflows
flags:
  -h, --help: Print help (see more with '--help')
  -V, --version: Print version
persistentflags:
  -C=: Working directory for this command
  --config=: User config file path
  --config-set=*: Override config with inline TOML, e.g. --config-set list.full=true (repeatable)
  -v, --verbose*: 'Verbose output (-v: info logs + hook/alias template variables on stderr; -vv: also debug logs and raw subprocess output written to .git/wt/logs/). Set WORKTRUNK_VERBOSE=0|1|2 to apply the same level everywhere — including shell completion, which no flag can reach'
  -y, --yes: Skip approval prompts
completion:
  flag:
    C:
    - $files
    config:
    - $files
documentation:
  flag:
    help: Print help (see a summary with '-h')
commands:
- name: switch
  description: Switch to a worktree; create if needed
  flags:
    -b, --base=: Base branch
    --branches: Include branches without worktrees
    --clobber: Remove stale paths at target
    -c, --create: Create a new branch
    -x, --execute=: Command to run after switch
    --format=:
      description: Output format
      default: text
    -h, --help: Print help (see more with '--help')
    --no-cd: Skip directory change after switching
    --no-hooks: Skip hooks
    --prs: Include open PRs/MRs
    --remotes: Include remote branches
  completion:
    flag:
      C:
      - $files
      config:
      - $files
      format:
      - text
      - json
  documentation:
    flag:
      base: |-
        Base branch

        Defaults to default branch. Supports the same shortcuts as the branch argument: ^, @, -, pr:{N}, mr:{N}.
      execute: |-
        Command to run after switch

        Replaces the wt process with the command after switching, giving it full terminal control. Useful for launching editors, AI agents, or other interactive tools.

        Without a branch argument, the interactive picker opens and the command runs against the selected worktree — so wt switch -x claude picks a worktree, then launches Claude Code there.

        Supports hook template variables ({{ branch }}, {{ worktree_path }}, etc.) and filters. {{ base }} and {{ base_worktree_path }} require --create.

        Especially useful with shell aliases:

          alias wsc='wt switch --create -x claude'
          wsc feature-branch -- 'Fix GH #322'

        Then wsc feature-branch creates the worktree and launches Claude Code. Arguments after -- are passed to the command, so wsc feature -- 'Fix GH #322' runs claude 'Fix GH #322', starting Claude with a prompt.

        Template example: -x code -- '{{ worktree_path }}' opens VS Code at the worktree, -x tmux -- new -s '{{ branch | sanitize }}' starts a tmux session named after the branch.
      format: |-
        Output format

        JSON prints structured result to stdout. Designed for tool integration (e.g., Claude Code WorktreeCreate hooks).
      no-cd: |-
        Skip directory change after switching

        Hooks still run normally. Useful when hooks handle navigation (e.g., tmux workflows) or for CI/automation. Use --cd to override.
- name: list
  description: List worktrees and their status
  flags:
    --branches: Include branches without worktrees
    --format=:
      description: Output format
      default: table
    --full: Show CI status and LLM summaries
    -h, --help: Print help (see more with '--help')
    --progressive: Show fast info immediately, update with slow info
    --remotes: Include remote branches
  completion:
    flag:
      C:
      - $files
      config:
      - $files
      format:
      - table
      - json
  documentation:
    flag:
      progressive: |-
        Show fast info immediately, update with slow info

        Displays local data (branches, paths, status) first, then updates with remote data (CI, upstream) as it arrives. Use --no-progressive to force buffered rendering. Auto-enabled for TTY.
  commands:
  - name: statusline
    description: Single-line status for shell prompts
    flags:
      --format=:
        description: Output format
        default: table
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - table
        - json
        - "claude-code\tClaude Code statusline mode (reads context from stdin)"
- name: remove
  description: Remove worktree; delete branch if merged
  flags:
    -f, --force: Force worktree removal
    -D, --force-delete: Delete unmerged branches
    --foreground: Run removal in foreground (block until complete)
    --format=:
      description: Output format
      default: text
    -h, --help: Print help (see more with '--help')
    --no-delete-branch: Keep branch after removal
    --no-hooks: Skip hooks
    --reap: Kill processes started in the worktree [experimental]
  completion:
    flag:
      C:
      - $files
      config:
      - $files
      format:
      - text
      - json
  documentation:
    command: |-
      Remove worktree; delete branch if merged

      Defaults to the current worktree.
    flag:
      force: |-
        Force worktree removal

        Remove a dirty worktree, including staged, modified, and untracked files. Without this flag, removal fails if the worktree has any uncommitted changes.
      format: |-
        Output format

        JSON prints structured result to stdout after removal completes.
      reap: |-
        Kill processes started in the worktree [experimental]

        Before removal, terminate processes whose working directory is under the worktree — dev servers, watchers, language servers. Processes holding a controlling terminal (interactive shells, terminal editors) are left alone. Unix only.
- name: merge
  description: Merge current branch into the target branch
  flags:
    --format=:
      description: Output format
      default: text
    -h, --help: Print help (see more with '--help')
    --no-commit: Skip commit and squash
    --no-ff: Create a merge commit (no fast-forward)
    --no-hooks: Skip hooks
    --no-rebase: Skip rebase (fail if not already rebased)
    --no-remove: Keep worktree after merge
    --no-squash: Skip commit squashing
    --stage=: 'What to stage before committing [default: all]'
  completion:
    flag:
      C:
      - $files
      config:
      - $files
      format:
      - text
      - json
      stage:
      - "all\tStage everything: untracked files + unstaged tracked changes"
      - "tracked\tStage tracked changes only (like git add -u)"
      - "none\tStage nothing, commit only what's already in the index"
  documentation:
    command: |-
      Merge current branch into the target branch

      Squash & rebase, fast-forward the target branch, remove the worktree.
    flag:
      format: |-
        Output format

        JSON prints structured result to stdout after merge completes.
- name: step
  description: Run individual operations
  flags:
    -h, --help: Print help (see more with '--help')
  completion:
    flag:
      C:
      - $files
      config:
      - $files
  documentation:
    command: |-
      Run individual operations

      The building blocks of wt merge — commit, squash, rebase, push — plus standalone utilities.
  commands:
  - name: commit
    description: Stage and commit with LLM-generated message
    flags:
      -b, --branch=: Branch to operate on (defaults to current worktree)
      --dry-run: Preview prompt, command, and generated message without committing
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
      --no-hooks: Skip hooks
      --stage=: 'What to stage before committing [default: all]'
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
        stage:
        - "all\tStage everything: untracked files + unstaged tracked changes"
        - "tracked\tStage tracked changes only (like git add -u)"
        - "none\tStage nothing, commit only what's already in the index"
    documentation:
      flag:
        format: |-
          Output format

          JSON prints structured result to stdout after the commit completes.
  - name: squash
    description: Squash commits since branching
    flags:
      --dry-run: Preview prompt, command, and generated message without squashing
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
      --no-hooks: Skip hooks
      --stage=: 'What to stage before committing [default: all]'
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
        stage:
        - "all\tStage everything: untracked files + unstaged tracked changes"
        - "tracked\tStage tracked changes only (like git add -u)"
        - "none\tStage nothing, commit only what's already in the index"
    documentation:
      command: |-
        Squash commits since branching

        Stages changes and generates message with LLM.
      flag:
        format: |-
          Output format

          JSON prints structured result to stdout after the squash completes.
  - name: rebase
    description: Rebase onto target
    flags:
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
    documentation:
      flag:
        format: |-
          Output format

          JSON prints structured result to stdout after the rebase completes.
  - name: push
    description: Fast-forward target to current branch
    flags:
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
      --no-ff: Create a merge commit (no fast-forward)
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
    documentation:
      flag:
        format: |-
          Output format

          JSON prints structured result to stdout after the push completes.
  - name: diff
    description: Show all changes since branching
    flags:
      -b, --branch=: Branch to operate on (defaults to current worktree)
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    documentation:
      command: |-
        Show all changes since branching

        Includes committed, staged, unstaged, and untracked files.
  - name: copy-ignored
    description: Copy gitignored files to another worktree
    flags:
      --dry-run: Show what would be copied
      --force: Overwrite existing files in destination
      --format=:
        description: Output format
        default: text
      --from=: Source worktree branch
      -h, --help: Print help (see more with '--help')
      --require-include: Require .worktreeinclude to copy anything
      --to=: Destination worktree branch
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
    documentation:
      command: |-
        Copy gitignored files to another worktree

        Eliminates cold starts by copying build caches and dependencies.
      flag:
        format: |-
          Output format

          JSON prints structured result to stdout after the copy completes.
        from: |-
          Source worktree branch

          Defaults to main worktree.
        to: |-
          Destination worktree branch

          Defaults to current worktree.
  - name: eval
    description: '[experimental] Evaluate a template expression'
    flags:
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
    documentation:
      command: |-
        [experimental] Evaluate a template expression

        Prints the result to stdout for use in scripts and shell substitutions.
      flag:
        format: |-
          Output format

          JSON prints {name, template, result} to stdout instead of the bare result.
  - name: for-each
    description: '[experimental] Run command in each worktree'
    flags:
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
    documentation:
      command: |-
        [experimental] Run command in each worktree

        Executes sequentially with real-time output; continues past command failures.
  - name: promote
    description: '[experimental] Swap a branch into the main worktree'
    flags:
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    documentation:
      command: |-
        [experimental] Swap a branch into the main worktree

        Exchanges branches and gitignored files between two worktrees.
  - name: prune
    description: '[experimental] Remove worktrees merged into the default branch'
    flags:
      --dry-run: Show what would be removed
      --foreground: Run removal in foreground (block until complete)
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
      --min-age=:
        description: Skip worktrees younger than this
        default: 1d
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
  - name: relocate
    description: '[experimental] Move worktrees to expected paths'
    flags:
      --clobber: Backup non-worktree paths at target locations
      --commit: Commit uncommitted changes before relocating
      --dry-run: Show what would be moved
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
    documentation:
      command: |-
        [experimental] Move worktrees to expected paths

        Relocates worktrees whose path doesn't match the worktree-path template.
      flag:
        clobber: |-
          Backup non-worktree paths at target locations

          Moves blocking paths to <path>.bak.<timestamp>. If that name is taken, counts up (…-2, …-3, …) to a free name.
        format: |-
          Output format

          JSON prints structured result to stdout after the relocate completes.
  - name: tether
    description: '[experimental] Run a command; kill its whole process tree when its worktree is removed'
    flags:
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    documentation:
      command: |-
        [experimental] Run a command; kill its whole process tree when its worktree is removed

        Teardown is automatic and needs no pre-remove hook; the group gets SIGTERM then SIGKILL.
- name: hook
  description: Run configured hooks
  flags:
    -h, --help: Print help (see more with '--help')
  completion:
    flag:
      C:
      - $files
      config:
      - $files
  commands:
  - name: show
    description: Show configured hooks
    flags:
      --expanded: Show expanded commands with current variables
      --format=:
        description: Output format
        default: text
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
      positional:
      - - pre-switch
        - post-switch
        - pre-start
        - post-start
        - pre-commit
        - post-commit
        - pre-merge
        - post-merge
        - pre-remove
        - post-remove
    documentation:
      command: |-
        Show configured hooks

        Lists user and project hooks. Project hooks show approval status (❓ = needs approval).
      flag:
        format: |-
          Output format

          JSON prints structured result to stdout — one record per configured command.
- name: config
  description: Manage user & project configs
  flags:
    -h, --help: Print help (see more with '--help')
  completion:
    flag:
      C:
      - $files
      config:
      - $files
  documentation:
    command: |-
      Manage user & project configs

      Includes shell integration, hooks, and saved state.
  commands:
  - name: create
    description: Create configuration file
    flags:
      -h, --help: Print help (see more with '--help')
      --project: Create project config (.config/wt.toml) instead of user config
    completion:
      flag:
        C:
        - $files
        config:
        - $files
  - name: show
    description: Show configuration files & locations
    flags:
      --format=:
        description: Output format
        default: text
      --full: Run diagnostic checks (CI tools, commit generation, version)
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
        format:
        - text
        - json
  - name: update
    description: Update deprecated config settings
    flags:
      -h, --help: Print help (see more with '--help')
      --print: Print the migrated config to stdout instead of writing it
    completion:
      flag:
        C:
        - $files
        config:
        - $files
  - name: approvals
    description: Manage command approvals
    flags:
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    commands:
    - name: list
      description: List project commands and their approval status
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
    - name: add
      description: Store approvals in approvals.toml
      flags:
        --all: Show all commands
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
    - name: clear
      description: Clear approved commands from approvals.toml
      flags:
        -g, --global: Clear global approvals
        -h, --help: Print help (see more with '--help')
        --stale: Clear only stale approvals
      completion:
        flag:
          C:
          - $files
          config:
          - $files
  - name: alias
    description: Inspect and preview aliases
    flags:
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    commands:
    - name: show
      description: Show an alias's template, or all aliases' templates
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
    - name: dry-run
      description: Preview an alias invocation with template expansion
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
  - name: plugins
    description: Plugin management
    flags:
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    commands:
    - name: claude
      description: Claude Code plugin
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
      commands:
      - name: install
        description: Install the Worktrunk plugin
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
      - name: uninstall
        description: Remove the Worktrunk plugin
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
      - name: install-statusline
        description: Configure the Claude Code statusline
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
    - name: codex
      description: Codex plugin
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
      commands:
      - name: install
        description: Configure the Worktrunk marketplace in Codex
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
      - name: uninstall
        description: Remove the Worktrunk marketplace from Codex
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
    - name: opencode
      description: OpenCode plugin
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
      commands:
      - name: install
        description: Install the activity tracking plugin
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
      - name: uninstall
        description: Remove the activity tracking plugin
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
  - name: state
    description: Manage internal data and cache
    flags:
      -h, --help: Print help (see more with '--help')
    completion:
      flag:
        C:
        - $files
        config:
        - $files
    commands:
    - name: get
      description: Get all stored state
      flags:
        --format=:
          description: Output format
          default: table
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
          format:
          - table
          - json
    - name: clear
      description: Clear all stored state
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
    - name: cache
      description: Regenerable caches
      flags:
        -h, --help: Print help (see more with '--help')
      persistentflags:
        --format=:
          description: 'Output format (text, json) [default: text]'
          default: text
      completion:
        flag:
          C:
          - $files
          config:
          - $files
          format:
          - text
          - json
      commands:
      - name: get
        description: Show cache contents
        flags:
          -h, --help: Print help
        completion:
          flag:
            C:
            - $files
            config:
            - $files
            format:
            - text
            - json
      - name: clear
        description: Drop all caches
        flags:
          -h, --help: Print help
        completion:
          flag:
            C:
            - $files
            config:
            - $files
            format:
            - text
            - json
    - name: default-branch
      description: Default branch detection and override
      flags:
        -h, --help: Print help (see more with '--help')
      completion:
        flag:
          C:
          - $files
          config:
          - $files
      commands:
      - name: get
        description: Get the default branch
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
      - name: set
        description: Set the default branch
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
      - name: clear
        description: Clear the default branch cache
        flags:
          -h, --help: Print help
        completion:
          flag:
            C:
            - $files
            config:
            - $files
    - name: logs
      description: Operation and debug logs
      flags:
        -h, --help: Print help (see more with '--help')
      persistentflags:
        --format=:
          description: 'Output format (text, json) [default: text]'
          default: text
      completion:
        flag:
          C:
          - $files
          config:
          - $files
          format:
          - text
          - json
      commands:
      - name: get
        description: List all log file paths
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
            format:
            - text
            - json
      - name: profile
        description: Performance profile from a trace
        flags:
          -h, --help: Print help (see more with '--help')
        completion:
          flag:
            C:
            - $files
            config:
            - $files
            format:
            - text
            - json
          positional:
          - - $files
      - name: clear
        description: Clear all log files
        flags:
          -h, --help: Print help
        completion:
          flag:
            C:
            - $files
            config:
            - $files
            format:
            - text
            - json
    - name: marker
      description: Branch markers
      flags:
        -h, --help: Print help (see more with '--help')
      persistentflags:
        --format=:
          description: 'Output format (text, json) [default: text]'
          default: text
      completion:
        flag:
          C:
          - $files
          config:
          - $files
          format:
          - text
          - json
      commands:
      - name: get
        description: Get marker for a branch
        flags:

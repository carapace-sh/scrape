      -w, --workspace=: Name of the workspace
    completion:
      flag:
        color:
        - always
        - never
        - auto
        manifest-path:
        - $files
    documentation:
      command: |-
        Prepend a value to a list configuration key

        Example: `pixi config prepend default-channels bioconda`
  - name: append
    description: Append a value to a list configuration key
    flags:
      -g, --global: Operation on global configuration
      -l, --local: Operation on project-local configuration
      -s, --system: Operation on system configuration
    persistentflags:
      -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
      -w, --workspace=: Name of the workspace
    completion:
      flag:
        color:
        - always
        - never
        - auto
        manifest-path:
        - $files
    documentation:
      command: |-
        Append a value to a list configuration key

        Example: `pixi config append default-channels bioconda`
  - name: set
    description: Set a configuration value
    flags:
      -g, --global: Operation on global configuration
      -l, --local: Operation on project-local configuration
      -s, --system: Operation on system configuration
    persistentflags:
      -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
      -w, --workspace=: Name of the workspace
    completion:
      flag:
        color:
        - always
        - never
        - auto

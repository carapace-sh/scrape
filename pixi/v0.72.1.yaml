  flags:
    -c, --channel=*: Channel to use in the workspace
    --conda-pypi-map=: Set conda↔PyPI mapping configuration
    --format=: The manifest format to create
    -i, --import=: Environment.yml file to bootstrap the workspace
    -p, --platform=*: Platforms that the workspace supports

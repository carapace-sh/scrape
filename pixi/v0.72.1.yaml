# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: pixi
description: |2

  Pixi [version 0.72.1] - Developer Workflow and Environment Management for Multi-Platform, Language-Agnostic Workspaces.

  Pixi is a versatile developer workflow tool designed to streamline the management of your workspace's dependencies, tasks, and environments.
  Built on top of the Conda ecosystem, Pixi offers seamless integration with the PyPI ecosystem.

  Basic Usage:
      Initialize pixi for a workspace:
      $ pixi init
      $ pixi add python numpy pytest

      Run a task:
      $ pixi task add test 'pytest -s'
      $ pixi run test

  Found a Bug or Have a Feature Request?
  Open an issue at: https://github.com/prefix-dev/pixi/issues

  Need Help?
  Ask a question on the Prefix Discord server: https://discord.gg/kKV8ZxyzY4

  For more information, see the documentation at: https://pixi.sh
flags:
  --list: List all installed commands (built-in and extensions)
  -V, --version: Print version
persistentflags:
  --color=:
    description: Whether the log needs to be colored
    default: auto
  -h, --help: Display help information
  --no-progress: Hide all progress bars, always turned on if stderr is not a terminal
  -q, --quiet*: Decrease logging verbosity (quiet mode)
  -v, --verbose*: Increase logging verbosity (-v for warnings, -vv for info, -vvv for debug, -vvvv for trace)
completion:
  flag:
    color:
    - always
    - never
    - auto
commands:
- name: add
  aliases:
  - a
  description: Adds dependencies to the workspace
  flags:
    --auth-file=: Path to the file containing the authentication token
    --branch=: The git branch
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    --editable: Whether the pypi requirement should be editable
    -f, --feature=:
      description: The feature for which the dependency should be modified
      default: default
    --frozen: Install the environment as defined in the lock file, doesn't update lock file if it isn't up-to-date with the manifest file
    -g, --git=: The git url to use when adding a git dependency
    --index=: The PyPI index URL to use for this dependency. Only applicable when adding pypi dependencies
    --locked: Check if lock file is up-to-date before installing the environment, aborts when lock file isn't up-to-date with the manifest file
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-install: Don't modify the environment, only modify the lock file
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --pinning-strategy=: Set pinning strategy
    -p, --platform=*: The platform for which the dependency should be modified. Must be the name of a platform already defined in the workspace
    --pypi: The specified dependencies are pypi dependencies. Conflicts with `host` and `build`
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --rev=: The git revision
    --run-post-link-scripts: Run post-link scripts (insecure)
    -s, --subdir=: The subdirectory of the git repository to use
    --tag=: The git tag
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      auth-file:
      - $files
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      manifest-path:
      - $files
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
  documentation:
    command: |-
      Adds dependencies to the workspace

      The dependencies should be defined as MatchSpec for conda package, a PyPI
      requirement for the `--pypi` dependencies, or an absolute path to a local
      `.conda` or `.tar.bz2` package file. If no specific version is provided,
      the latest version compatible with your workspace will be chosen
      automatically or a * will be used.

      Example usage:

      - `pixi add python=3.9`: This will select the latest minor version that
        complies with 3.9.*, i.e., python version 3.9.0, 3.9.1, 3.9.2, etc.
      - `pixi add python`: In absence of a specified version, the latest version
        will be chosen. For instance, this could resolve to python version
        3.11.3.* at the time of writing.

      Adding multiple dependencies at once is also supported:

      - `pixi add python pytest`: This will add both `python` and `pytest` to the
        workspace's dependencies.

      The `--platform` and `--build/--host` flags make the dependency target
      specific.

      - `pixi add python --platform linux-64 --platform osx-arm64`: Will add the
        latest version of python for linux-64 and osx-arm64 platforms.
      - `pixi add python --build`: Will add the latest version of python for as a
        build dependency.

      Mixing `--platform` and `--build`/`--host` flags is supported

      The `--pypi` option will add the package as a pypi dependency. This cannot
      be mixed with the conda dependencies

      - `pixi add --pypi boto3`
      - `pixi add --pypi "boto3==version"`

      If the workspace manifest is a `pyproject.toml`, adding a pypi dependency will
      add it to the native pyproject `project.dependencies` array or to the native
      `dependency-groups` table if a feature is specified:

      - `pixi add --pypi boto3` will add `boto3` to the `project.dependencies`
        array
      - `pixi add --pypi boto3 --feature aws` will add `boto3` to the
        `dependency-groups.aws` array
      - `pixi add --pypi --editable 'boto3 @ file://absolute/path/to/boto3'` will add
        the local editable `boto3` to the `pypi-dependencies` array

      Note that if `--platform` or `--editable` are specified, the pypi dependency
      will be added to the `tool.pixi.pypi-dependencies` table instead as native
      arrays have no support for platform-specific or editable dependencies.

      These dependencies will then be read by pixi as if they had been added to
      the pixi `pypi-dependencies` tables of the default or of a named feature.

      The versions will be automatically added with a pinning strategy based on
      semver or the pinning strategy set in the config. There is a list of
      packages that are not following the semver versioning scheme but will use
      the minor version by default:
      Python, Rust, Julia, GCC, GXX, GFortran, NodeJS, Deno, R, R-Base, Perl
- name: auth
  description: Login to prefix.dev or anaconda.org servers to access private channels
  completion:
    flag:
      color:
      - always
      - never
      - auto
  commands:
  - name: login
    description: Store authentication information for a given host
    flags:
      --conda-token=: The token to use on anaconda.org / quetz authentication
      --oauth: Use OAuth/OIDC authentication
      --oauth-client-id=: OAuth client ID (defaults to "rattler")
      --oauth-client-secret=: OAuth client secret (for confidential clients)
      --oauth-flow=: 'OAuth flow: device-code (default), auth-code, auto'
      --oauth-issuer-url=: OIDC issuer URL (defaults to <https://{host>})
      --oauth-redirect-uri=: OAuth redirect URI (defaults to a random localhost port). Set this when the OAuth client on the `IdP` side is registered with a specific redirect URI such as `http://127.0.0.1:8000/auth/oidc`
      --oauth-scope=*: Additional OAuth scopes to request (repeatable)
      --password=: The password to use (for basic HTTP authentication)
      --s3-access-key-id=: The S3 access key ID
      --s3-secret-access-key=: The S3 secret access key
      --s3-session-token=: The S3 session token
      --token=: The token to use (for authentication with prefix.dev)
      --user-agent=: User-Agent header used for requests
      --username=: The username to use (for basic HTTP authentication)
    completion:
      flag:
        color:
        - always
        - never
        - auto
        oauth-flow:
        - device-code
        - auth-code
        - auto
  - name: logout
    description: Remove authentication information for a given host
    flags:
      --all: Remove every stored authentication entry (revoking OAuth tokens for each)
    completion:
      flag:
        color:
        - always
        - never
        - auto
  - name: status
    description: Show stored authentication entries and non-secret token metadata
    flags:
      -v, --verbose: Show endpoint URLs, client ID, and other IdP-introspection fields that are only useful for debugging
    completion:
      flag:
        color:
        - always
        - never
        - auto
  - name: help
    description: Print this message or the help of the given subcommand(s)
    commands:
    - name: login
      description: Store authentication information for a given host
    - name: logout
      description: Remove authentication information for a given host
    - name: status
      description: Show stored authentication entries and non-secret token metadata
    - name: help
      description: Print this message or the help of the given subcommand(s)
- name: clean
  description: Cleanup the environments
  flags:
    --activation-cache: Only remove the activation cache
    --build: Only remove the pixi-build cache
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    -e, --environment=: The environment directory to remove
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --workspaces-registry: Only remove disassociated workspace registries
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      manifest-path:
      - $files
  documentation:
    command: |-
      Cleanup the environments.

      This command removes the information in the .pixi folder. You can specify the environment to remove with the `--environment` flag.

      Use the `cache` subcommand to clean the cache.
  commands:
  - name: cache
    description: Clean the cache of your system which are touched by pixi
    flags:
      --build: Clean only the build related cache
      --build-backends: Clean only the build backends environments cache
      --conda: Clean only the conda related cache
      --exec: Clean only `exec` cache
      --mapping: Clean only the mapping cache
      --pypi: Clean only the pypi related cache
      --repodata: Clean only the repodata cache
      -y, --yes: Answer yes to all questions
      --assume-yes&: Answer yes to all questions
    completion:
      flag:
        color:
        - always
        - never
        - auto
        manifest-path:
        - $files
    documentation:
      command: |-
        Clean the cache of your system which are touched by pixi.

        Specify the cache type to clean with the flags.
  - name: help
    description: Print this message or the help of the given subcommand(s)
    commands:
    - name: cache
      description: Clean the cache of your system which are touched by pixi
    - name: help
      description: Print this message or the help of the given subcommand(s)
- name: completion
  description: Generates a completion script for a shell
  flags:
    -s, --shell!=: The shell to generate a completion script for
  completion:
    flag:
      color:
      - always
      - never
      - auto
      shell:
      - "bash\tBourne Again SHell (bash)"
      - "elvish\tElvish shell"
      - "fish\tFriendly Interactive SHell (fish)"
      - "nushell\tNushell"
      - "powershell\tPowerShell"
      - "zsh\tZ SHell (zsh)"

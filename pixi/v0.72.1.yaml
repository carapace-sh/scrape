      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
  documentation:
    command: |-
      Runs task in the pixi environment.

      This command is used to run tasks in the pixi environment. It will activate the environment and run the task in the environment. It is using the deno_task_shell to run the task.

      `pixi run` will also update the lock file and install the environment if it is required.
    flag:
      clean-env: |-
        Use a clean environment to run the task

        Using this flag will ignore your current shell environment and use bare minimum environment to activate the pixi environment in.
      executable: |-
        Execute the command as an executable without resolving Pixi tasks.

        Useful when a task name and an executable have the same name.
      templated: |-
        Enable template rendering for the command arguments.

        By default, arguments passed to `pixi run` on the command line are not processed by the template engine. Use this flag to enable rendering of template variables like `{{ pixi.platform }}`.

        - $files
    documentation:
      command: |-
        Unset a configuration value

        Example: `pixi config unset default-channels`
  - name: help
    description: Print this message or the help of the given subcommand(s)
    commands:
    - name: edit
      description: Edit the configuration file
    - name: list
      description: List configuration values
    - name: prepend
      description: Prepend a value to a list configuration key
    - name: append
      description: Append a value to a list configuration key
    - name: set
      description: Set a configuration value
    - name: unset
      description: Unset a configuration value
    - name: help
      description: Print this message or the help of the given subcommand(s)
- name: exec
  aliases:
  - x
  description: Run a command and install it in a temporary environment
  flags:
    --auth-file=: Path to the file containing the authentication token
    -c, --channel=*: The channels to consider as a name or a url. Multiple channels can be specified by using this field multiple times
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --force-reinstall: If specified a new environment is always created even if one already exists
    --list?: Before executing the command, list packages in the environment Specify `--list=some_regex` to filter the shown packages
    --no-hard-links: Disallow hard links during package installation
    --no-modify-ps1: Disable modification of the PS1 prompt to indicate the temporary environment
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --pinning-strategy=: Set pinning strategy
    -p, --platform=: The platform to create the environment for. Defaults to the current machine's subdir. Accepts a workspace platform name or a bare conda subdir (e.g. `linux-64`); `pixi exec` runs outside any workspace so the value resolves to a conda subdir either way
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --run-post-link-scripts: Run post-link scripts (insecure)
    -s, --spec=*: Matchspecs of package to install. If this is not provided, the package is guessed from the command
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
    -w, --with=*: Matchspecs of package to install, while also guessing a package from the command
  completion:
    flag:
      auth-file:
      - $files
      color:
      - always
      - never
      - auto
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
  documentation:
    command: |-
      Run a command and install it in a temporary environment.

      Remove the temporary environments with `pixi clean cache --exec`.
    flag:
      channel: |-
        The channels to consider as a name or a url. Multiple channels can be specified by using this field multiple times.

        When specifying a channel, it is common that the selected channel also depends on the `conda-forge` channel.

        By default, if no channel is provided, `conda-forge` is used.
- name: global
  aliases:
  - g
  description: Subcommand for global package management actions
  completion:
    flag:
      color:
      - always
      - never
      - auto
  documentation:
    command: |-
      Subcommand for global package management actions.

      Install packages on the user level. Into to the `$PIXI_HOME` directory, which defaults to `~/.pixi`.
  commands:
  - name: add
    aliases:
    - a
    description: Adds dependencies to an environment
    flags:
      --auth-file=: Path to the file containing the authentication token
      --branch=: The git branch
      --concurrent-downloads=: Max concurrent network requests, default is `50`
      --concurrent-solves=: Max concurrent solves, default is the number of CPUs
      -e, --environment!=: Specifies the environment that the dependencies need to be added to
      --expose=*: Add one or more mapping which describe which executables are exposed. The syntax is `exposed_name=executable_name`, so for example `python3.10=python`. Alternatively, you can input only an executable_name and `executable_name=executable_name` is assumed
      --git=: The git url, e.g. `https://github.com/user/repo.git`
      --no-hard-links: Disallow hard links during package installation
      --no-ref-links: Disallow ref links (copy-on-write) during package installation
      --no-symbolic-links: Disallow symbolic links during package installation
      --path=: The path to the local package
      --pinning-strategy=: Set pinning strategy
      --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
      --rev=: The git revision
      --run-post-link-scripts: Run post-link scripts (insecure)
      --subdir=: The subdirectory within the git repository
      --tag=: The git tag
      --tls-no-verify: Do not verify the TLS certificate of the server
      --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
      --use-environment-activation-cache: Use environment activation cache (experimental)
    completion:
      flag:
        auth-file:
        - $files
        color:
        - always
        - never
        - auto
        pinning-strategy:
        - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
        - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
        - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
        - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
        - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
        - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
        pypi-keyring-provider:
        - disabled
        - subprocess
    documentation:
      command: |-
        Adds dependencies to an environment

        Example:

        - `pixi global add --environment python numpy`
        - `pixi global add --environment my_env pytest pytest-cov --expose pytest=pytest`
  - name: edit
    description: Edit the global manifest file
    completion:
      flag:
        color:
        - always
        - never
        - auto
    documentation:
      command: |-
        Edit the global manifest file

        Opens your editor to edit the global manifest file.
  - name: install
    aliases:
    - i
    description: Installs the defined packages in a globally accessible location and exposes their command line applications.
    flags:
      --auth-file=: Path to the file containing the authentication token
      --branch=: The git branch
      -c, --channel=*: The channels to consider as a name or a url. Multiple channels can be specified by using this field multiple times
      --concurrent-downloads=: Max concurrent network requests, default is `50`
      --concurrent-solves=: Max concurrent solves, default is the number of CPUs
      -e, --environment=: Ensures that all packages will be installed in the same environment
      --expose=*: Add one or more mapping which describe which executables are exposed. The syntax is `exposed_name=executable_name`, so for example `python3.10=python`. Alternatively, you can input only an executable_name and `executable_name=executable_name` is assumed
      --force-reinstall: Specifies that the environment should be reinstalled
      --git=: The git url, e.g. `https://github.com/user/repo.git`
      --no-hard-links: Disallow hard links during package installation
      --no-ref-links: Disallow ref links (copy-on-write) during package installation
      --no-shortcuts: Specifies that no shortcuts should be created for the installed packages
      --no-shortcut&: Specifies that no shortcuts should be created for the installed packages
      --no-symbolic-links: Disallow symbolic links during package installation
      --path=: The path to the local package
      --pinning-strategy=: Set pinning strategy
      -p, --platform=: The platform to install the packages for
      --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
      --rev=: The git revision
      --run-post-link-scripts: Run post-link scripts (insecure)
      --subdir=: The subdirectory within the git repository
      --tag=: The git tag
      --tls-no-verify: Do not verify the TLS certificate of the server
      --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
      --use-environment-activation-cache: Use environment activation cache (experimental)
      --with=*: Add additional dependencies to the environment. Their executables will not be exposed
    completion:
      flag:
        auth-file:
        - $files
        color:
        - always
        - never
        - auto

  flags:
    -a, --all: Install all environments
    --auth-file=: Path to the file containing the authentication token
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    -e, --environment=*: The environment to install
    --frozen: Install the environment as defined in the lock file, doesn't update lock file if it isn't up-to-date with the manifest file
    --locked: Check if lock file is up-to-date before installing the environment, aborts when lock file isn't up-to-date with the manifest file
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --pinning-strategy=: Set pinning strategy
    -p, --platform=: Re-install for the given platform; a warning is printed when it doesn't run on this machine
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --run-post-link-scripts: Run post-link scripts (insecure)
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      auth-file:
      - $files
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      manifest-path:
      - $files
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
  documentation:
    command: |-
      Re-install an environment, both updating the lock file and re-installing the environment.

      This command reinstalls an environment, if the lock file is not up-to-date it will be updated. If packages are specified, only those packages will be reinstalled. Otherwise the whole environment will be reinstalled.

      `pixi reinstall` only re-installs one environment at a time, if you have multiple environments you can select the right one with the `--environment` flag. If you don't provide an environment, the `default` environment will be re-installed.

      If you want to re-install all environments, you can use the `--all` flag.
- name: publish
  description: Build a conda package and publish it to a channel.
  flags:
    --auth-file=: Path to the file containing the authentication token
    -b, --build-dir=: The directory to use for incremental builds artifacts
    --build-number=: An optional override for the package's build number
    --build-platform=:
      description: The build platform to use for building (defaults to the current platform)
      default: linux-64
    --build-string-prefix=: An optional prefix prepended to the auto-generated build string
    -c, --clean: Whether to clean the build directory before building
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    --force: Force overwrite existing packages
    --generate-attestation: Generate sigstore attestation (prefix.dev only)
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --package-format=: 'Archive format and optional compression level, e.g. `conda`, `tar-bz2`, `conda:max`, `conda:15`, `tar-bz2:9`. Numeric ranges match rattler-build: -7..=22 for `.conda`, 1..=9 for `.tar.bz2`'
    --path=: The path to a directory containing a package manifest, or to a specific manifest file
    --pinning-strategy=: Set pinning strategy
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --run-post-link-scripts: Run post-link scripts (insecure)
    --skip-existing=:
      description: Skip uploading packages that already exist at the target. This is enabled by default. Use `--no-skip-existing` to disable
      default: 'true'
    --target-channel=: The target channel to publish packages to. Accepts a URL (prefix.dev, anaconda.org, cloudsmith://, s3://, quetz://, artifactory://) or a local filesystem path / `file://` URL for an indexed local channel
    --to=: The target channel to publish packages to. Accepts a URL (prefix.dev, anaconda.org, cloudsmith://, s3://, quetz://, artifactory://) or a local filesystem path / `file://` URL for an indexed local channel
    --target-dir=: The local filesystem path to copy the built package(s) into (no channel indexing)
    -t, --target-platform=:
      description: The target platform to build for (defaults to the current platform)
      default: linux-64
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
    --variant=*: Override a build variant key with one or more values
    -m, --variant-config=*: Path to an additional variant configuration YAML file
  completion:
    flag:
      auth-file:
      - $files
      build-dir:
      - $files
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      path:
      - $files
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
      skip-existing:
      - 'true'
      - 'false'
      target-dir:
      - $files
      variant-config:
      - $files
  documentation:
    command: |-
      Build a conda package and publish it to a channel.

      Builds the package from your workspace and either uploads it to a channel
      (`--target-channel`) or copies the artifact into a local directory
      (`--target-dir`).

      Supported destinations for `--target-channel` (alias `--to`):
        - prefix.dev: `https://prefix.dev/<channel-name>`
        - anaconda.org: `https://anaconda.org/<owner>/<label>`
        - Cloudsmith: `cloudsmith://<owner>/<repository>`
        - S3: `s3://bucket-name`
        - Quetz: `quetz://server/<channel>`
        - Artifactory: `artifactory://server/<channel>`
        - Local filesystem channel (with indexing):
          `file:///path/to/channel` or a bare path

      Use `--target-dir <PATH>` instead to copy the built package(s) into a
      directory without creating a channel structure.
    flag:
      path: |-
        The path to a directory containing a package manifest, or to a specific manifest file.

        Supported manifest files: `package.xml`, `recipe.yaml`, `pixi.toml`, `pyproject.toml`, or `mojoproject.toml`.
      target-channel: |-
        The target channel to publish packages to. Accepts a URL (prefix.dev, anaconda.org, cloudsmith://, s3://, quetz://, artifactory://) or a local filesystem path / `file://` URL for an indexed local channel.

        Mutually exclusive with `--target-dir`.
      target-dir: |-
        The local filesystem path to copy the built package(s) into (no channel indexing).

        Accepts an absolute or relative directory path. Mutually exclusive with `--target-channel`.
      variant: |-
        Override a build variant key with one or more values.

        Use `--variant KEY=VALUE` to build only that variant, or `--variant KEY=VAL1,VAL2,...` to constrain a variant to a subset of values. Repeat the flag for multiple keys. Values supplied here replace any matching key from the workspace `build-variants` and any `--variant-config` files.

        Example: `pixi publish --variant python=3.12 --variant cuda-version=12.8,13.0`.
      variant-config: |-
        Path to an additional variant configuration YAML file.

        Mirrors rattler-build's `--variant-config/-m`. Repeat to add multiple files. Paths are appended after the workspace-level `build-variants-files`.
- name: remove
  aliases:
  - rm
  description: Removes dependencies from the workspace
  flags:
    --auth-file=: Path to the file containing the authentication token
    --branch=: The git branch
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    -f, --feature=:
      description: The feature for which the dependency should be modified
      default: default
    --frozen: Install the environment as defined in the lock file, doesn't update lock file if it isn't up-to-date with the manifest file
    -g, --git=: The git url to use when adding a git dependency
    --locked: Check if lock file is up-to-date before installing the environment, aborts when lock file isn't up-to-date with the manifest file
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-install: Don't modify the environment, only modify the lock file
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --pinning-strategy=: Set pinning strategy
    -p, --platform=*: The platform for which the dependency should be modified. Must be the name of a platform already defined in the workspace
    --pypi: The specified dependencies are pypi dependencies. Conflicts with `host` and `build`
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --rev=: The git revision
    --run-post-link-scripts: Run post-link scripts (insecure)
    -s, --subdir=: The subdirectory of the git repository to use
    --tag=: The git tag
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      auth-file:
      - $files
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      manifest-path:
      - $files
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
  documentation:
    command: |-
      Removes dependencies from the workspace.

      If the workspace manifest is a `pyproject.toml`, removing a pypi dependency with the `--pypi` flag will remove it from either

      - the native pyproject `project.dependencies` array or, if a feature is specified, the native `project.optional-dependencies` table

      - pixi `pypi-dependencies` tables of the default feature or, if a feature is specified, a named feature

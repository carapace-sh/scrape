      -n, --name=: Name of the workspace to register. Defaults to the name of the current workspace
      --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
      -p, --path=: Path to register. Defaults to the path to the current workspace

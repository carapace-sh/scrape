- name: import
  description: Imports a file into an environment in an existing workspace.
  flags:
    --auth-file=: Path to the file containing the authentication token
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    -e, --environment=: A name for the created environment
    -f, --feature=: A name for the created feature
    --format=: Which format to interpret the file as
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --pinning-strategy=: Set pinning strategy
    -p, --platform=*: The platforms for the imported environment. Accepts a workspace platform name; a bare conda subdir (e.g. `linux-64`) is also accepted. Names that aren't yet declared get auto-added as subdir platforms
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --run-post-link-scripts: Run post-link scripts (insecure)
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      auth-file:
      - $files
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      format:
      - conda-env
      - pypi-txt
      manifest-path:
      - $files
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
    positional:
    - - $files
  documentation:
    command: |-
      Imports a file into an environment in an existing workspace.

      If `--format` isn't provided, `import` will try each format in turn
- name: install
  aliases:
  - i
  description: Install an environment, both updating the lock file and installing the environment
  flags:
    -a, --all: Install all environments
    --auth-file=: Path to the file containing the authentication token
    --concurrent-downloads=: Max concurrent network requests, default is `50`
    --concurrent-solves=: Max concurrent solves, default is the number of CPUs
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    -e, --environment=*: The environment to install
    --frozen: Install the environment as defined in the lock file, doesn't update lock file if it isn't up-to-date with the manifest file
    --locked: Check if lock file is up-to-date before installing the environment, aborts when lock file isn't up-to-date with the manifest file
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-hard-links: Disallow hard links during package installation
    --no-ref-links: Disallow ref links (copy-on-write) during package installation
    --no-symbolic-links: Disallow symbolic links during package installation
    --only=*: Install and build only these package(s) and their dependencies. Can be passed multiple times
    --pinning-strategy=: Set pinning strategy
    -p, --platform=: Install for the given platform; a warning is printed when it doesn't run on this machine
    --pypi-keyring-provider=: Specifies whether to use the keyring to look up credentials for PyPI
    --run-post-link-scripts: Run post-link scripts (insecure)
    --skip=*: 'Skip installation of specific packages present in the lock file. This uses a soft exclusion: the package will be skipped but its dependencies are installed'
    --skip-with-deps=*: 'Skip a package and its entire dependency subtree. This performs a hard exclusion: the package and its dependencies are not installed unless reachable from another non-skipped root'
    --tls-no-verify: Do not verify the TLS certificate of the server
    --tls-root-certs=: 'Which TLS root certificates to use: ''webpki'' (bundled Mozilla roots) or ''system'' (system store)'
    --use-environment-activation-cache: Use environment activation cache (experimental)
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      auth-file:
      - $files
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      manifest-path:
      - $files
      pinning-strategy:
      - "semver\tDefault semver strategy e.g. `1.2.3` becomes `>=1.2.3, <2` but `0.1.0` becomes `>=0.1.0, <0.2`"
      - "minor\tPin the latest minor e.g. `1.2.3` becomes `>=1.2.3, <1.3`"
      - "major\tPin the latest major e.g. `1.2.3` becomes `>=1.2.3, <2`"
      - "latest-up\tPin to the latest version or higher. e.g. `1.2.3` becomes `>=1.2.3`"
      - "exact-version\tPin the version chosen by the solver. e.g. `1.2.3` becomes `==1.2.3`"
      - "no-pin\tNo pinning, keep the requirement empty. e.g. `1.2.3` becomes `*`"
      pypi-keyring-provider:
      - disabled
      - subprocess
  documentation:
    command: |-
      Install an environment, both updating the lock file and installing the environment.

      This command installs an environment, if the lock file is not up-to-date it will be updated.

      `pixi install` only installs one environment at a time, if you have multiple environments you can select the right one with the `--environment` flag. If you don't provide an environment, the `default` environment will be installed.

      If you want to install all environments, you can use the `--all` flag.

      Running `pixi install` is not required before running other commands like `pixi run` or `pixi shell`. These commands will automatically install the environment if it is not already installed.

      You can use `pixi reinstall` to reinstall all environments, one environment or just some packages of an environment.
- name: list
  aliases:
  - ls
  description: List the packages of the current workspace
  flags:
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    -e, --environment=: The environment to list packages for. Defaults to the default environment
    -x, --explicit: Only list packages that are explicitly defined in the workspace
    --fields=*:
      description: Select which fields to display and in what order (comma-separated)
      default: name,version,build,size,kind,source
    --frozen: Install the environment as defined in the lock file, doesn't update lock file if it isn't up-to-date with the manifest file
    --json: Whether to output in json format
    --json-pretty&: Whether to output in json format
    --locked: Check if lock file is up-to-date before installing the environment, aborts when lock file isn't up-to-date with the manifest file
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-install: Don't modify the environment, only modify the lock file
    --platform=: The platform to list packages for. Defaults to the platform best matching this machine. Accepts a workspace platform name; a bare conda subdir (e.g. `linux-64`) is also accepted
    --sort-by=:
      description: Sorting strategy
      default: name
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      fields:
      - arch
      - build
      - build-number
      - constrains
      - depends
      - file-name
      - is-editable
      - kind
      - license
      - license-family
      - md5
      - name
      - noarch
      - platform
      - requested-spec
      - sha256
      - size
      - source
      - subdir
      - timestamp
      - track-features
      - url
      - version
      manifest-path:
      - $files
      sort-by:
      - size
      - name
      - kind
  documentation:
    command: |-
      List the packages of the current workspace

      Highlighted packages are explicit dependencies.
- name: lock
  description: Solve environment and update the lock file without installing the environments
  flags:
    --check: Check if any changes have been made to the lock file. If yes, exit with a non-zero code
    --config-file=: Load configuration from this file instead of searching system and user-level paths. Project-local `<project>/.pixi/config.toml` is still merged on top
    --dry-run: Compute the lock file without writing to disk. Implies --no-install
    --json: Output the changes in JSON format
    --no-config: Don't read system or user-level configuration files. Project-local `<project>/.pixi/config.toml` is still loaded
    --no-install: Don't modify the environment, only modify the lock file
  persistentflags:
    -m, --manifest-path=: The path to `pixi.toml`, `pyproject.toml`, or the workspace directory
    -w, --workspace=: Name of the workspace
  completion:
    flag:
      color:
      - always
      - never
      - auto
      config-file:
      - $files
      manifest-path:
      - $files
- name: reinstall
